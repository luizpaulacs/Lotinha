<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>Loterial Pro · Sistema Cloud Comercial</title>
  <!-- Firebase v9 CDN (ES Modules) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCkU-ZK-QOJSKq501qaArudk3IFGAQZvUU",
      authDomain: "lotinha-abbea.firebaseapp.com",
      projectId: "lotinha-abbea",
      storageBucket: "lotinha-abbea.firebasestorage.app",
      messagingSenderId: "898899134131",
      appId: "1:898899134131:web:267afeb1ee07b6bbcd92c6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = app;
    window.auth = auth;
    window.db = db;
    window.firebaseReady = true;
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --bg-dark: #0f172a;
      --bg-card-dark: #1e293b;
      --bg-card-light: #ffffff;
      --text-dark: #0f172a;
      --text-light: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --border-light: #e2e8f0;
      --border-dark: #334155;
      --shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
      --radius-lg: 1.5rem;
      --radius-md: 1rem;
      --radius-sm: 0.75rem;
      --transition: 0.2s ease;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* light theme overrides */
    body.light {
      background: #f1f5f9;
      color: var(--text-dark);
    }
    body.light .card, body.light .tab-content, body.light .modal-content {
      background: var(--bg-card-light);
      border-color: var(--border-light);
      color: var(--text-dark);
    }
    body.light .tab-nav button {
      color: #475569;
    }
    body.light .tab-nav button.active {
      background: var(--primary);
      color: white;
    }
    body.light input, body.light textarea, body.light select {
      background: white;
      border-color: #cbd5e1;
      color: #0f172a;
    }

    .app-container {
      width: 100%;
      max-width: 1300px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: var(--bg-card-dark);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      padding: 1.5rem 1.8rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-dark);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #c084fc, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border-dark);
      color: var(--text-light);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 500;
    }
    body.light .theme-toggle {
      border-color: #cbd5e1;
      color: #1e293b;
    }

    .auth-lock {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(20px);
      background: rgba(15, 23, 42, 0.8);
      border-radius: 2rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 450px;
      margin: 2rem auto;
    }

    .tab-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .tab-nav button {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-dark);
      color: #cbd5e1;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }
    .tab-nav button.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(139,92,246,0.4);
    }

    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    .grid-2col {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    input, textarea, select {
      background: #0f172a;
      border: 1px solid var(--border-dark);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1rem;
      color: white;
      width: 100%;
      margin-top: 0.3rem;
    }

    .btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }
    .btn-danger {
      background: var(--danger);
    }
    .btn-success {
      background: var(--success);
    }

    .badge {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      border-radius: 1rem;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-otimo { background: #10b981; color: white; }
    .badge-bom { background: #3b82f6; color: white; }
    .badge-regular { background: #f59e0b; color: black; }
    .badge-ruim { background: #ef4444; color: white; }

    .dezena-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: #334155;
      font-weight: 700;
      margin: 0.15rem;
    }

    @media print {
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { position: absolute; left: 0; top: 0; width: 100%; }
    }
  </style>
</head>
<body class="dark">
<div class="app-container" id="appRoot">
  <div id="authUI"></div>
  <div id="mainUI" style="display: none;"></div>
</div>

<script type="module">
  window.addEventListener('load', () => {
    if (!window.firebaseReady) {
      alert("Firebase não carregou.");
      return;
    }
    const auth = window.auth;
    const db = window.db;

    // Estados globais
    let currentUser = null;
    let isAdmin = false;
    let userDocData = null;
    let allConcursosCache = [];

    // Mapeamento de abas
    const appRoot = document.getElementById('appRoot');
    const authUI = document.getElementById('authUI');
    const mainUI = document.getElementById('mainUI');

    function renderAuth() {
      authUI.innerHTML = `
        <div class="auth-lock card">
          <div style="font-size:2rem; margin-bottom:1rem;">🎲</div>
          <h2 style="margin-bottom:1.5rem;">Loterial Pro</h2>
          <div id="authForm" style="width:100%">
            <input type="email" id="authEmail" placeholder="Email" autocomplete="email" style="margin-bottom:0.8rem;">
            <input type="password" id="authSenha" placeholder="Senha" autocomplete="current-password" style="margin-bottom:1rem;">
            <div style="display:flex; gap:0.8rem;">
              <button class="btn" id="btnLogin">Entrar</button>
              <button class="btn btn-outline" id="btnCadastrar">Criar Conta</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('btnLogin').addEventListener('click', () => {
        const email = document.getElementById('authEmail').value.trim();
        const senha = document.getElementById('authSenha').value;
        signInWithEmailAndPassword(auth, email, senha).catch(e => alert(e.message));
      });
      document.getElementById('btnCadastrar').addEventListener('click', async () => {
        const email = document.getElementById('authEmail').value.trim();
        const senha = document.getElementById('authSenha').value;
        try {
          const cred = await createUserWithEmailAndPassword(auth, email, senha);
          await setDoc(doc(db, "usuarios", cred.user.uid), {
            email: email,
            status_licenca: "pendente",
            data_cadastro: new Date(),
            dias_trial: 7
          });
          alert("Conta criada! Trial de 7 dias ativado.");
        } catch (e) { alert(e.message); }
      });
    }

    function verificarAcesso(user) {
      if (!user) {
        mainUI.style.display = 'none';
        authUI.style.display = 'block';
        renderAuth();
        return;
      }
      authUI.style.display = 'none';
      mainUI.style.display = 'block';

      const adminCheck = async () => {
        try {
          await getDocs(collection(db, "usuarios"));
          isAdmin = true;
        } catch (e) {
          isAdmin = false;
        }
        if (isAdmin) {
          userDocData = { status_licenca: "ativo" };
          construirInterface();
          return;
        }
        const userDoc = await getDoc(doc(db, "usuarios", user.uid));
        if (!userDoc.exists()) {
          await signOut(auth);
          return;
        }
        userDocData = userDoc.data();
        if (userDocData.status_licenca === "ativo") {
          construirInterface();
        } else if (userDocData.status_licenca === "pendente") {
          const agora = new Date();
          const criacao = userDocData.data_cadastro?.toDate ? userDocData.data_cadastro.toDate() : new Date(userDocData.data_cadastro);
          const diffDias = Math.floor((agora - criacao) / (1000*60*60*24));
          const restantes = 7 - diffDias;
          if (restantes > 0) {
            alert(`Trial ativo · ${restantes} dia(s) restante(s).`);
            construirInterface();
          } else {
            alert("Trial expirado. Contate o administrador.");
            await signOut(auth);
          }
        } else {
          await signOut(auth);
        }
      };
      adminCheck();
    }

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      verificarAcesso(user);
    });

    function construirInterface() {
      mainUI.innerHTML = `
        <div class="card header-row">
          <span class="logo">Loterial Pro</span>
          <div style="display:flex; gap:1rem; align-items:center;">
            <button class="theme-toggle" id="themeToggle">🌓 Tema</button>
            <span>${currentUser?.email || ''}</span>
            <button class="btn btn-outline" id="btnLogout">Sair</button>
          </div>
        </div>
        <div class="tab-nav" id="tabNav"></div>
        <div id="tabContentContainer" class="card"></div>
      `;
      document.getElementById('themeToggle').addEventListener('click', () => {
        document.body.classList.toggle('light');
      });
      document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

      const tabs = [];
      if (isAdmin) tabs.push({ id: 'licencas', label: 'Licenças Admin' });
      if (isAdmin) tabs.push({ id: 'concursos', label: 'Concursos' });
      tabs.push({ id: 'gerador', label: 'Gerador' });
      tabs.push({ id: 'avaliador', label: 'Avaliador' });
      tabs.push({ id: 'conferidor', label: 'Conferidor' });

      const nav = document.getElementById('tabNav');
      nav.innerHTML = tabs.map((t, i) => `<button class="${i===0?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');
      document.getElementById('tabContentContainer').innerHTML = tabs.map(t => `<div class="tab-content ${t.id==='gerador'?'active':''}" id="tab-${t.id}"></div>`).join('');

      document.querySelectorAll('.tab-nav button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          const id = e.target.dataset.tab;
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          document.getElementById(`tab-${id}`).classList.add('active');
          if (id === 'licencas') renderLicencas();
          if (id === 'concursos') renderConcursos();
          if (id === 'gerador') renderGerador();
          if (id === 'avaliador') renderAvaliador();
          if (id === 'conferidor') renderConferidor();
        });
      });
      renderGerador();
    }

    async function renderLicencas() {
      const container = document.getElementById('tab-licencas');
      container.innerHTML = '<p>Carregando licenças...</p>';
      const snap = await getDocs(collection(db, "usuarios"));
      const users = [];
      snap.forEach(d => users.push({ id: d.id, ...d.data() }));
      container.innerHTML = `<h3>Gerenciar Licenças</h3><table style="width:100%; border-collapse:collapse;">${users.map(u => `
        <tr style="border-bottom:1px solid #334155;">
          <td>${u.email}</td><td>${u.status_licenca}</td>
          <td><button class="btn btn-success btn-sm ativar" data-id="${u.id}">Ativar</button>
          <button class="btn btn-danger btn-sm bloquear" data-id="${u.id}">Bloquear</button></td>
        </tr>`).join('')}</table>`;
      container.querySelectorAll('.ativar').forEach(b => b.addEventListener('click', async (e) => {
        await updateDoc(doc(db, "usuarios", e.target.dataset.id), { status_licenca: "ativo" });
        renderLicencas();
      }));
      container.querySelectorAll('.bloquear').forEach(b => b.addEventListener('click', async (e) => {
        await updateDoc(doc(db, "usuarios", e.target.dataset.id), { status_licenca: "bloqueado" });
        renderLicencas();
      }));
    }

    async function carregarConcursos() {
      const q = query(collection(db, "concursos"), orderBy("numero", "desc"), limit(50));
      const snap = await getDocs(q);
      allConcursosCache = [];
      snap.forEach(d => allConcursosCache.push(d.data()));
    }

    async function renderConcursos() {
      await carregarConcursos();
      const container = document.getElementById('tab-concursos');
      container.innerHTML = `
        <div class="grid-2col">
          <div><h3>Cadastrar Concurso</h3>
            <input id="numConcurso" placeholder="Número"><br>
            <input id="dataConcurso" type="date"><br>
            <input id="dezenasConcurso" placeholder="15 dezenas (ex: 01,02,03...)"><br>
            <button class="btn" id="salvarConcurso">Salvar</button>
          </div>
          <div><h4>Últimos 5</h4><div id="ultimosConcursos"></div></div>
        </div>`;
      document.getElementById('salvarConcurso').addEventListener('click', async () => {
        const num = document.getElementById('numConcurso').value.trim();
        const data = document.getElementById('dataConcurso').value;
        const dezenasStr = document.getElementById('dezenasConcurso').value;
        let dezenas = dezenasStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
        if (dezenas.length !== 15) return alert("Exatamente 15 dezenas.");
        dezenas.sort((a,b)=>a-b);
        const moldura = [1,2,3,4,5,6,10,11,15,16,20,21,22,23,24,25];
        const qtdMol = dezenas.filter(d => moldura.includes(d)).length;
        const impares = dezenas.filter(d => d%2!==0).length;
        await setDoc(doc(db, "concursos", num), {
          numero: num, data, dezenas, moldura: qtdMol, impares, pares: 15-impares
        });
        alert("Concurso salvo!");
        renderConcursos();
      });
      const ultimos = allConcursosCache.slice(0,5);
      document.getElementById('ultimosConcursos').innerHTML = ultimos.map(c => `<p>${c.numero}: ${c.dezenas?.join(',')}</p>`).join('');
    }

    function renderGerador() {
      document.getElementById('tab-gerador').innerHTML = `
        <h3>Motor Combinatório</h3>
        <select id="estrategiaGerador">
          <option value="1">Matriz Personalizada</option><option value="2">Moldura/Miolo</option><option value="3">Quadrantes</option>
          <option value="4">Fechamento R4</option><option value="5">Desdobramento R5</option><option value="6">Fechamento R6</option>
          <option value="7">5 Fixas + 5 Grupos</option><option value="8">5 Grupos de 5</option>
          <option value="9">8 Fixas + 10 Var</option><option value="10">9 Fixas + 8 Var</option><option value="11">ABC Ciclo</option>
        </select>
        <select id="qtdNumeros">${[15,16,17,18].map(n=>`<option value="${n}">${n} números</option>`).join('')}</select>
        <select id="filtroImpares"><option value="">Sem filtro</option><option>8x7</option><option>9x6</option></select>
        <button class="btn" id="gerarJogos">Gerar Jogos</button>
        <div id="jogosGerados" style="margin:1rem 0;"></div>
        <div><button class="btn" id="avaliarLote">Avaliar Todos</button>
        <button class="btn" id="enviarConferidor">Enviar ao Conferidor</button>
        <button class="btn" id="baixarExcel">Baixar CSV</button>
        <button class="btn" id="imprimirLista">Imprimir</button></div>`;
      document.getElementById('gerarJogos').addEventListener('click', gerarCombinacoes);
    }

    function gerarCombinacoes() {
      const qtd = parseInt(document.getElementById('qtdNumeros').value);
      const jogos = [];
      for (let k=0; k<10; k++) {
        let tentativa = 0;
        let jogo = [];
        while (jogo.length < qtd && tentativa < 4000) {
          const n = Math.floor(Math.random()*25)+1;
          if (!jogo.includes(n)) jogo.push(n);
          tentativa++;
        }
        jogo.sort((a,b)=>a-b);
        jogos.push(jogo);
      }
      document.getElementById('jogosGerados').innerHTML = jogos.map(j => `<div>${j.map(d=>`<span class="dezena-circle">${d}</span>`).join('')}</div>`).join('');
    }

    function renderAvaliador() {
      document.getElementById('tab-avaliador').innerHTML = `<h3>Avaliador Inteligente</h3><textarea id="jogosAvaliar" placeholder="Cole jogos, um por linha"></textarea><button class="btn" id="executarAvaliacao">Avaliar</button><div id="resultadoAvaliacao"></div>`;
    }
    function renderConferidor() {
      document.getElementById('tab-conferidor').innerHTML = `<h3>Conferidor Avançado</h3><input id="resultadoOficial" placeholder="Resultado (15 nums)"><textarea id="jogosConferir"></textarea><button class="btn" id="conferirBtn">Conferir</button><div id="resumoConferencia"></div>`;
    }

    window.renderGerador = renderGerador;
    window.renderAvaliador = renderAvaliador;
    window.renderConferidor = renderConferidor;
    window.renderLicencas = renderLicencas;
    window.renderConcursos = renderConcursos;
  });
</script>
</body>
</html>
